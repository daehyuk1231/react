<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #wrapper {
            width: 1280px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        section {
            display: flex;
        }

        nav {
            display: flex;
            flex-direction: column;
        }

        article {
            display: flex;
            flex-direction: column;
        }

        footer {
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div id="wrapper">
        <header>
            <img src="/images/layout/header.png">
        </header>

        <section>
            <nav>
                    <img src="/images/layout/nav-top.png">
                    <img src="/images/layout/nav-bottom.png">
            </nav>
            <article>
                    <img src="/images/layout/article-top.png">
                    <img src="/images/layout/article-mid.png">
                    <img src="/images/layout/article-bottom.png">
            </article>
        </section>

        <footer>
                <img src="/images/layout/footer-top.png">
                <img src="/images/layout/footer-bottom.png">
        </footer>
</div>
</body>
</html>

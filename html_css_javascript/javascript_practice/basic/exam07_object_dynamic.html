<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" rel="stylesheet"></script>

    <script>
        // 전역 변수
        const car = {};

        function fun1() {
            car.name = "그랜저";
            car.run=function(){
                console.log(this.name + "가 달립니다.");
            }

            console.log(car.name);
            car.run();
        }
    </script>
</head>

<body>
    <button class="btn btn-info btn-sm" onclick="fun1()">fun1() 호출</button>
</body>

</html>
